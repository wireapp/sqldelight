org.gradle.jvmargs=-Xmx16g -XX:MaxMetaspaceSize=4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.parallel=true

GROUP=com.wire.sqldelight
VERSION_NAME=2.3.2

POM_URL=https://github.com/wireapp/sqldelight
POM_SCM_URL=https://github.com/wireapp/sqldelight
POM_SCM_CONNECTION=scm:git:github.com/wireapp/sqldelight.git
POM_SCM_DEV_CONNECTION=scm:git:ssh://github.com/wireapp/sqldelight.git

POM_LICENCE_NAME=Apache-2.0
POM_LICENCE_URL=https://www.apache.org/licenses/LICENSE-2.0.txt
POM_LICENCE_DIST=repo

POM_DEVELOPER_ID=Wire
POM_DEVELOPER_NAME=Wire Swiss GmbH

mavenCentralPublishing=true
mavenCentralAutomaticPublishing=true
signAllPublications=true
SONATYPE_CLOSE_TIMEOUT_SECONDS=3600

android.useAndroidX=true

kotlin.mpp.stability.nowarn=true
kotlin.native.ignoreDisabledTargets=true

# caches break the linkage of the sqlite amalgamation
kotlin.native.cacheKind.linuxX64=none

org.jetbrains.intellij.platform.useCacheRedirector=false
org.jetbrains.intellij.platform.selfUpdateCheck=false
